name: Python tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out Gate 2E branch
        uses: actions/checkout@v4
        with:
          ref: stage-5-gate-2e-attempt-accounting

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply focused Gate 2E patch
        shell: bash
        run: |
          if git log -1 --pretty=%B | grep -q '\[gate2e-attempt-applied\]'; then
            echo "Gate 2E patch is already applied."
          else
            python tools/apply_gate2e_attempt_slice.py
          fi

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run focused Gate 2E tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/test_attempt_accounting.py \
            tests/test_codex_cli_provider.py \
            tests/test_provider_bound_engine.py \
            tests/test_replay_script.py \
            -vv 2>&1 | tee gate2e-focused.log

      - name: Run full tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -vv 2>&1 | tee pytest.log

      - name: Commit tested Gate 2E patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests docs
          if git diff --cached --quiet; then
            echo "No tested Gate 2E changes to commit."
            exit 0
          fi
          git commit -m "feat: persist model attempts and enforce usage budgets [gate2e-attempt-applied]"
          git push origin HEAD:stage-5-gate-2e-attempt-accounting

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: |
            gate2e-focused.log
            pytest.log
          if-no-files-found: warn
