name: Python tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -vv 2>&1 | tee pytest.log

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
          if-no-files-found: error

      - name: Export source for focused repair
        uses: actions/upload-artifact@v4
        with:
          name: pr13-source-export
          path: |
            src/imperium/offline/provider_engine.py
            src/imperium/offline/fixtures.py
            tests/test_provider_bound_engine.py
            docs/STAGE_5_GATE_2_PROVIDER_INJECTION.md
          if-no-files-found: error
