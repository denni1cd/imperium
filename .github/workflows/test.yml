name: Python tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out Gate 2E branch
        uses: actions/checkout@v4
        with:
          ref: stage-5-gate-2e-attempt-accounting

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply integrity review fixes
        run: python tools/apply_gate2e_integrity_review.py

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run focused integrity tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/test_attempt_accounting.py \
            tests/test_attempt_integrity.py \
            tests/test_provider_bound_engine.py \
            tests/test_codex_cli_provider.py \
            -vv 2>&1 | tee gate2e-integrity.log

      - name: Run full tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -vv 2>&1 | tee pytest.log

      - name: Commit tested integrity fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests docs
          if git diff --cached --quiet; then
            echo "No tested Gate 2E integrity changes to commit."
            exit 0
          fi
          git commit -m "fix: harden Gate 2E budget and retry integrity [gate2e-integrity-applied]"
          git push origin HEAD:stage-5-gate-2e-attempt-accounting

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: |
            gate2e-integrity.log
            pytest.log
          if-no-files-found: warn
