name: Export PR13 source

on:
  push:
    branches:
      - stage-5-gate-2-provider-injection

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: pr13-source-export
          path: |
            src/imperium/offline/provider_engine.py
            src/imperium/offline/fixtures.py
            tests/test_provider_bound_engine.py
            docs/STAGE_5_GATE_2_PROVIDER_INJECTION.md
          if-no-files-found: error
