name: Apply PR13 repair

on:
  push:
    branches:
      - stage-5-gate-2-provider-injection

permissions:
  contents: write

jobs:
  repair:
    if: ${{ !contains(github.event.head_commit.message, '[pr13-repair-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage-5-gate-2-provider-injection
      - name: Apply focused repair
        run: python tools/repair_pr13_material_input.py
      - name: Commit repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/imperium/offline/provider_engine.py \
                  src/imperium/offline/fixtures.py \
                  tests/test_provider_bound_engine.py \
                  docs/STAGE_5_GATE_2_PROVIDER_INJECTION.md
          if git diff --cached --quiet; then
            echo "No repair changes were required."
            exit 0
          fi
          git commit -m "fix: require incorporated material revisions [pr13-repair-applied]"
          git push origin HEAD:stage-5-gate-2-provider-injection
