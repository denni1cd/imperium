name: Apply Gate 2E attempt slice

on:
  push:
    branches:
      - stage-5-gate-2e-attempt-accounting

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[gate2e-attempt-applied]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage-5-gate-2e-attempt-accounting
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply focused patch
        run: python tools/apply_gate2e_attempt_slice.py
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Run focused tests
        run: >-
          python -m pytest
          tests/test_attempt_accounting.py
          tests/test_codex_cli_provider.py
          tests/test_provider_bound_engine.py
          tests/test_replay_script.py
          -q
      - name: Run full suite
        run: python -m pytest -q
      - name: Commit tested slice
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests docs
          if git diff --cached --quiet; then
            echo "No Gate 2E patch changes were required."
            exit 0
          fi
          git commit -m "feat: persist model attempts and enforce usage budgets [gate2e-attempt-applied]"
          git push origin HEAD:stage-5-gate-2e-attempt-accounting
