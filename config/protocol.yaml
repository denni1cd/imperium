version: "1.1"
status: approved
vocabulary_version: "1.0"
council_version: "1.0"

normalization_rules:
  - Preserve the source wording and source artifact identifier before creating a canonical claim.
  - Represent one decision-relevant proposition per normalized claim; split compound statements when their parts could be challenged independently.
  - Classify each claim as fact, assumption, interpretation, value judgment, forecast, proposed action, tradeoff, or risk.
  - Assign materiality from the expected effect on the final recommendation, not from rhetorical emphasis.
  - Keep factual, interpretive, and value disagreements distinct; do not merge them into apparent consensus.
  - Merge claims only when they assert the same proposition under the same conditions; preserve materially different conditions or confidence levels.
  - Record dependencies between claims so challenges can target the premise that actually controls the recommendation.
  - Preserve original minority formulations as source variants even when a canonical claim is created.

stage_contracts:
  - stage_id: preserve_request
    prerequisite_stage: created
    resulting_stage: request_preserved
    actor: engine
    allowed_input_artifacts:
      - sovereign_request
    required_output_artifacts:
      - sovereign_request
    prompt_template: null
    per_advocate: false
    blind: false
    permits_evidence_requests: false

  - stage_id: select_fixed_council
    prerequisite_stage: request_preserved
    resulting_stage: council_selected
    actor: engine
    allowed_input_artifacts:
      - sovereign_request
      - council_snapshot
    required_output_artifacts:
      - council_snapshot
    prompt_template: null
    per_advocate: false
    blind: false
    permits_evidence_requests: false

  - stage_id: independent_interpretation
    prerequisite_stage: council_selected
    resulting_stage: interpretations_complete
    actor: advocate
    allowed_input_artifacts:
      - sovereign_request
      - council_snapshot
    required_output_artifacts:
      - interpretation
    prompt_template: prompts/interpretation.md
    per_advocate: true
    blind: true
    permits_evidence_requests: false

  - stage_id: compare_and_normalize_frames
    prerequisite_stage: interpretations_complete
    resulting_stage: frames_compared
    actor: seneschal
    allowed_input_artifacts:
      - sovereign_request
      - interpretation
    required_output_artifacts:
      - claim_register
      - frame_register
    prompt_template: prompts/compare_frames.md
    per_advocate: false
    blind: false
    permits_evidence_requests: false

  - stage_id: challenge_frames
    prerequisite_stage: frames_compared
    resulting_stage: frame_challenges_complete
    actor: seneschal
    allowed_input_artifacts:
      - sovereign_request
      - interpretation
      - claim_register
      - frame_register
      - council_snapshot
    required_output_artifacts:
      - challenge_plan
      - challenge
      - challenge_response
      - continuation_decision
    prompt_template: prompts/challenge_frames.md
    per_advocate: false
    blind: false
    permits_evidence_requests: true
    challenge_turns:
      - turn_id: author_frame_challenge
        speaker_from_assignment: challenger
        allowed_input_artifacts:
          - sovereign_request
          - council_snapshot
          - interpretation
          - claim_register
          - frame_register
          - challenge_plan
        required_output_artifact: challenge
        prompt_template: prompts/author_challenge.md
      - turn_id: answer_frame_challenge
        speaker_from_assignment: target
        allowed_input_artifacts:
          - sovereign_request
          - council_snapshot
          - interpretation
          - claim_register
          - frame_register
          - challenge_plan
          - challenge
        required_output_artifact: challenge_response
        prompt_template: prompts/respond_challenge.md

  - stage_id: resolve_frame_evidence
    prerequisite_stage: frame_challenges_complete
    resulting_stage: evidence_resolved
    actor: engine
    allowed_input_artifacts:
      - sovereign_request
      - claim_register
      - frame_register
      - challenge_plan
      - challenge
      - challenge_response
      - evidence_request
    required_output_artifacts:
      - evidence_resolution
    prompt_template: null
    per_advocate: false
    blind: false
    permits_evidence_requests: false

  - stage_id: develop_independent_strategies
    prerequisite_stage: evidence_resolved
    resulting_stage: strategies_complete
    actor: advocate
    allowed_input_artifacts:
      - sovereign_request
      - council_snapshot
      - claim_register
      - frame_register
      - challenge_plan
      - challenge
      - challenge_response
      - evidence_resolution
    required_output_artifacts:
      - strategy_proposal
    prompt_template: prompts/proposal.md
    per_advocate: true
    blind: false
    permits_evidence_requests: false

  - stage_id: challenge_proposals
    prerequisite_stage: strategies_complete
    resulting_stage: proposal_challenges_complete
    actor: seneschal
    allowed_input_artifacts:
      - sovereign_request
      - council_snapshot
      - frame_register
      - evidence_resolution
      - strategy_proposal
    required_output_artifacts:
      - claim_register
      - challenge_plan
      - challenge
      - challenge_response
      - continuation_decision
    prompt_template: prompts/challenge_proposals.md
    per_advocate: false
    blind: false
    permits_evidence_requests: true
    challenge_turns:
      - turn_id: author_proposal_challenge
        speaker_from_assignment: challenger
        allowed_input_artifacts:
          - sovereign_request
          - council_snapshot
          - frame_register
          - evidence_resolution
          - strategy_proposal
          - claim_register
          - challenge_plan
        required_output_artifact: challenge
        prompt_template: prompts/author_challenge.md
      - turn_id: answer_proposal_challenge
        speaker_from_assignment: target
        allowed_input_artifacts:
          - sovereign_request
          - council_snapshot
          - frame_register
          - evidence_resolution
          - strategy_proposal
          - claim_register
          - challenge_plan
          - challenge
        required_output_artifact: challenge_response
        prompt_template: prompts/respond_challenge.md

  - stage_id: resolve_proposal_evidence
    prerequisite_stage: proposal_challenges_complete
    resulting_stage: proposal_evidence_resolved
    actor: engine
    allowed_input_artifacts:
      - sovereign_request
      - claim_register
      - strategy_proposal
      - challenge_plan
      - challenge
      - challenge_response
      - evidence_request
    required_output_artifacts:
      - evidence_resolution
    prompt_template: null
    per_advocate: false
    blind: false
    permits_evidence_requests: false

  - stage_id: revise_positions
    prerequisite_stage: proposal_evidence_resolved
    resulting_stage: revisions_complete
    actor: advocate
    allowed_input_artifacts:
      - sovereign_request
      - council_snapshot
      - frame_register
      - strategy_proposal
      - claim_register
      - challenge_plan
      - challenge
      - challenge_response
      - evidence_resolution
      - continuation_decision
    required_output_artifacts:
